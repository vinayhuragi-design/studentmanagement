<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <th:block th:replace="~{fragments/layout :: head}"></th:block>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Enrollment Dashboard</title>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{

            --primary:#8b5cf6;
            --secondary:#6366f1;
            --dark:#0f172a;
            --dark2:#1e293b;
            --glass:rgba(255,255,255,.08);
            --border:rgba(255,255,255,.12);

        }

        body{

            font-family:'Poppins',sans-serif;

            background:
                    linear-gradient(
                            135deg,
                            #020617,
                            #0f172a,
                            #1e1b4b,
                            #111827
                    );

            background-size:400% 400%;

            animation:bgMove 16s ease infinite;

            min-height:100vh;

            overflow-x:hidden;

            color:white;
        }

        @keyframes bgMove{

            0%{
                background-position:0% 50%;
            }

            50%{
                background-position:100% 50%;
            }

            100%{
                background-position:0% 50%;
            }
        }

        /* FLOATING ORBS */

        .orb{

            position:fixed;

            border-radius:50%;

            filter:blur(90px);

            z-index:-1;

            animation:float 10s ease-in-out infinite;
        }

        .orb1{

            width:320px;
            height:320px;

            background:rgba(139,92,246,.35);

            top:-100px;
            left:-100px;
        }

        .orb2{

            width:260px;
            height:260px;

            background:rgba(59,130,246,.25);

            right:-80px;
            top:35%;

            animation-delay:2s;
        }

        .orb3{

            width:220px;
            height:220px;

            background:rgba(16,185,129,.18);

            bottom:-60px;
            left:40%;

            animation-delay:4s;
        }

        @keyframes float{

            0%,100%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(-25px);
            }
        }

        /* REMOVE WHITE BACKGROUND */

        #wrapper,
        #page-content-wrapper,
        .container-fluid,
        .table-responsive{

            background:transparent !important;
        }

        .table > :not(caption) > * > *{

            background-color:transparent !important;

            box-shadow:none !important;
        }

        /* HERO */

        .hero-section{

            position:relative;

            margin-bottom:30px;

            overflow:hidden;

            border-radius:30px;

            padding:40px;

            background:
                    linear-gradient(
                            135deg,
                            rgba(255,255,255,.12),
                            rgba(255,255,255,.05)
                    );

            backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,.12);

            box-shadow:
                    0 20px 45px rgba(0,0,0,.25);

            animation:fadeUp .8s ease;
        }

        .hero-section::before{

            content:'';

            position:absolute;

            inset:0;

            background:
                    url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1974&auto=format&fit=crop');

            background-size:cover;

            background-position:center;

            opacity:.10;
        }

        .hero-content{

            position:relative;

            z-index:2;

            display:flex;

            justify-content:space-between;

            align-items:center;

            flex-wrap:wrap;

            gap:20px;
        }

        .hero-title{

            font-size:2.8rem;

            font-weight:700;

            margin-bottom:10px;

            background:
                    linear-gradient(
                            90deg,
                            #ffffff,
                            #c4b5fd,
                            #8b5cf6
                    );

            background-size:200% auto;

            background-clip:text;

            -webkit-background-clip:text;

            color:transparent;

            -webkit-text-fill-color:transparent;

            animation:gradientMove 5s linear infinite;
        }

        @keyframes gradientMove{

            0%{
                background-position:0% center;
            }

            100%{
                background-position:200% center;
            }
        }

        .hero-subtitle{

            color:rgba(255,255,255,.75);

            font-size:15px;
        }

        .hero-btn{

            display:inline-flex;

            align-items:center;

            gap:10px;

            padding:14px 26px;

            border-radius:100px;

            background:
                    linear-gradient(
                            135deg,
                            #8b5cf6,
                            #6366f1
                    );

            color:white;

            text-decoration:none;

            font-weight:600;

            transition:.3s ease;

            box-shadow:
                    0 10px 30px rgba(99,102,241,.35);
        }

        .hero-btn:hover{

            transform:translateY(-4px) scale(1.03);

            color:white;
        }

        /* ALERT */

        .alert-success{

            background:
                    rgba(16,185,129,.15);

            border:
                    1px solid rgba(16,185,129,.25);

            color:#d1fae5;

            border-radius:18px;

            backdrop-filter:blur(10px);

            padding:16px;
        }

        /* CARD */

        .glass-card{

            border-radius:28px;

            overflow:hidden;

            background:
                    linear-gradient(
                            135deg,
                            rgba(255,255,255,.10),
                            rgba(255,255,255,.05)
                    );

            backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,.12);

            box-shadow:
                    0 20px 45px rgba(0,0,0,.25);

            animation:fadeUp 1s ease;
        }

        .glass-card .card-header{

            padding:22px 28px;

            background:
                    rgba(255,255,255,.05) !important;

            border-bottom:
                    1px solid rgba(255,255,255,.08);

            color:white;

            font-size:1.2rem;

            font-weight:600;
        }

        .glass-card .card-body{

            padding:25px;
        }

        /* TABLE */

        .table{

            width:100%;

            color:white;

            margin-bottom:0;

            border-collapse:separate;

            border-spacing:0 14px;
        }

        .table thead th{

            border:none;

            color:rgba(255,255,255,.75);

            text-transform:uppercase;

            font-size:13px;

            letter-spacing:1px;

            padding:18px;
        }

        .table tbody tr{

            background:
                    rgba(15,23,42,.85);

            transition:.3s ease;

            border-radius:18px;
        }

        .table tbody tr:hover{

            transform:translateY(-3px);

            background:
                    rgba(30,41,59,.95);
        }

        .table tbody td{

            border:none;

            background:transparent !important;

            color:white !important;

            padding:22px 18px;

            vertical-align:middle;

            font-weight:500;
        }

        .table tbody tr td:first-child{

            border-radius:18px 0 0 18px;
        }

        .table tbody tr td:last-child{

            border-radius:0 18px 18px 0;
        }

        /* ACTION BUTTON */

        .action-btn{

            width:42px;
            height:42px;

            border-radius:14px;

            display:flex;

            align-items:center;

            justify-content:center;

            text-decoration:none;

            color:white;

            background:
                    linear-gradient(
                            135deg,
                            #3b82f6,
                            #2563eb
                    );

            transition:.3s ease;

            box-shadow:
                    0 10px 20px rgba(37,99,235,.35);
        }

        .action-btn:hover{

            transform:translateY(-3px) scale(1.05);

            color:white;
        }

        /* PAGINATION */

        .pagination .page-link{

            background:
                    rgba(255,255,255,.08);

            border:none;

            color:white;

            margin:0 5px;

            border-radius:12px;

            transition:.3s ease;
        }

        .pagination .page-link:hover{

            background:#6366f1;

            transform:translateY(-2px);
        }

        .pagination .active .page-link{

            background:
                    linear-gradient(
                            135deg,
                            #8b5cf6,
                            #6366f1
                    );

            color:white;
        }

        /* EMPTY */

        .empty-state{

            text-align:center;

            padding:60px 20px;

            color:rgba(255,255,255,.75);
        }

        .empty-state i{

            font-size:4rem;

            margin-bottom:15px;

            color:#60a5fa;
        }

        /* ANIMATION */

        @keyframes fadeUp{

            from{
                opacity:0;
                transform:translateY(30px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        /* RESPONSIVE */

        @media(max-width:768px){

            .hero-section{

                padding:28px;
            }

            .hero-title{

                font-size:2rem;
            }

            .table{

                min-width:760px;
            }
        }

    </style>

</head>

<body>

<!-- FLOATING ORBS -->

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="d-flex" id="wrapper">

    <!-- SIDEBAR -->

    <div th:replace="~{fragments/layout :: sidebar}"></div>

    <!-- PAGE CONTENT -->

    <div id="page-content-wrapper">

        <!-- NAVBAR -->

        <div th:replace="~{fragments/layout :: navbar}"></div>

        <div class="container-fluid px-4 py-4">

            <!-- HERO -->

            <div class="hero-section">

                <div class="hero-content">

                    <div>

                        <h1 class="hero-title">
                            Students Enrolled in Courses
                        </h1>

                        <p class="hero-subtitle">
                            Track enrollment coverage, fees, and quick access to details.
                        </p>

                    </div>

                    <a th:href="@{/enrollments/showEnroll}"
                       class="hero-btn">

                        <i class="bi bi-plus-circle-fill"></i>

                        Enroll Student

                    </a>

                </div>

            </div>

            <!-- ALERT -->

            <div th:if="${message}"
                 class="alert alert-success text-center mb-4"
                 role="alert"
                 th:text="${message}">
            </div>

            <!-- CARD -->

            <div class="card glass-card">

                <!-- HEADER -->

                <div class="card-header">

                    <i class="bi bi-table me-2"></i>

                    Enrolled Students

                </div>

                <!-- BODY -->

                <div class="card-body">

                    <!-- EMPTY -->

                    <div class="empty-state"
                         th:if="${students.content.isEmpty()}">

                        <i class="bi bi-person-x-fill"></i>

                        <h4>No Students Found</h4>

                    </div>

                    <!-- TABLE -->

                    <div class="table-responsive"
                         th:if="${!students.content.isEmpty()}">

                        <table class="table align-middle">

                            <thead>

                            <tr>

                                <th>#</th>

                                <th>Student Name</th>

                                <th>Email</th>

                                <th>Courses Count</th>

                                <th>Total Fee</th>

                                <th>Actions</th>

                            </tr>

                            </thead>

                            <tbody>

                            <tr th:each="student : ${students.content}">

                                <td th:text="${student.studentId}">
                                </td>

                                <td th:text="${student.studentName}">
                                </td>

                                <td th:text="${student.email}">
                                </td>

                                <td th:text="${student.courseCount}">
                                </td>

                                <td>

                                    ₹
                                    <span th:text="${student.totalFee}"></span>

                                </td>

                                <td>

                                    <a th:href="@{/enrollments/getStudentEnrollmentDetails/{id}(id=${student.studentId}, source='enrollments')}"
                                       class="action-btn"
                                       title="View">

                                        <i class="bi bi-eye-fill"></i>

                                    </a>

                                </td>

                            </tr>

                            </tbody>

                        </table>

                    </div>

                    <!-- PAGINATION -->

                    <nav class="mt-4">

                        <ul class="pagination justify-content-end">

                            <!-- PREVIOUS -->

                            <li class="page-item"
                                th:classappend="${students.first} ? 'disabled'">

                                <a class="page-link"
                                   th:href="@{'/enrollments/enrollmentList'(page=${students.first ? 0 : students.number -1}, size=${students.size})}">

                                    Previous

                                </a>

                            </li>

                            <!-- PAGE NUMBERS -->

                            <li class="page-item"
                                th:each="pageNum : ${#numbers.sequence(0, students.totalPages-1)}"
                                th:classappend="${pageNum} == ${students.number} ? 'active' : ''">

                                <a class="page-link"
                                   th:href="@{'/enrollments/enrollmentList'(page=${pageNum}, size=${students.size})}"
                                   th:text="${pageNum + 1}">
                                </a>

                            </li>

                            <!-- NEXT -->

                            <li class="page-item"
                                th:classappend="${students.last} ? 'disabled'">

                                <a class="page-link"
                                   th:href="@{'/enrollments/enrollmentList'(page=${students.last ? students.number : students.number + 1}, size=${students.size})}">

                                    Next

                                </a>

                            </li>

                        </ul>

                    </nav>

                </div>

            </div>

        </div>

    </div>

</div>

<div th:replace="~{fragments/layout :: scripts}"></div>

</body>

</html>
