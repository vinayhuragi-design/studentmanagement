<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <!-- Head Fragment -->
    <th:block th:replace="~{fragments/layout :: head}"></th:block>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html,
        body{

            height:100%;

            font-family:'Poppins',sans-serif;

            overflow-x:hidden;
        }

        body{

            background:
                    linear-gradient(
                    rgba(5,10,30,0.88),
                    rgba(5,10,30,0.92)
                    ),

                    url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1800&auto=format&fit=crop')
                    no-repeat center center/cover;

            background-attachment:fixed;

            min-height:100vh;

            position:relative;
        }

        /* REMOVE WHITE BACKGROUND */

        #wrapper,
        #page-content-wrapper,
        .container-fluid,
        .table-responsive{

            background:transparent !important;
        }

        /* REMOVE BOOTSTRAP TABLE COLORS */

        .table > :not(caption) > * > * {

            background-color: transparent !important;

            box-shadow: none !important;
        }

        /* NAVBAR */

        nav,
        .navbar{

            background:
                    rgba(10,15,35,0.75) !important;

            backdrop-filter:blur(14px);

            border-bottom:
                    1px solid rgba(255,255,255,0.05);
        }

        /* SIDEBAR */

        #sidebar-wrapper{

            background:
                    linear-gradient(
                    180deg,
                    rgba(8,12,30,0.98),
                    rgba(15,23,42,0.96)
                    ) !important;

            border-right:
                    1px solid rgba(255,255,255,0.05);
        }

        /* SIDEBAR ITEMS */

        #sidebar-wrapper .list-group-item{

            background:transparent !important;

            color:rgba(255,255,255,0.82);

            border:none;

            padding:18px 24px;

            transition:0.35s ease;

            font-weight:500;
        }

        #sidebar-wrapper .list-group-item:hover{

            background:
                    rgba(255,255,255,0.06) !important;

            color:white;

            padding-left:30px;
        }

        #sidebar-wrapper .list-group-item.active{

            background:
                    linear-gradient(
                    135deg,
                    #3b82f6,
                    #8b5cf6
                    ) !important;

            color:white !important;

            border-radius:0 16px 16px 0;

            box-shadow:
                    0 8px 20px rgba(59,130,246,0.35);
        }

        /* GLOW EFFECT */

        .glow{

            position:fixed;

            width:320px;
            height:320px;

            border-radius:50%;

            filter:blur(120px);

            z-index:0;

            animation:floating 8s ease-in-out infinite;
        }

        .glow.one{

            top:-60px;
            left:-60px;

            background:
                    rgba(59,130,246,0.25);
        }

        .glow.two{

            bottom:-60px;
            right:-60px;

            background:
                    rgba(139,92,246,0.25);
        }

        @keyframes floating{

            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(-20px);
            }

            100%{
                transform:translateY(0px);
            }
        }

        /* CONTENT */

        #page-content-wrapper{

            position:relative;

            z-index:2;
        }

        /* HEADER */

        .dashboard-header{

            display:flex;

            justify-content:space-between;

            align-items:center;

            margin-bottom:28px;

            animation:fadeDown 0.8s ease;
        }

        .dashboard-title{

            color:white;

            font-size:2.3rem;

            font-weight:700;

            display:flex;

            align-items:center;

            gap:14px;
        }

        .dashboard-title i{

            color:#60a5fa;
        }

        @keyframes fadeDown{

            from{

                opacity:0;

                transform:translateY(-20px);
            }

            to{

                opacity:1;

                transform:translateY(0);
            }
        }

        /* BUTTON */

        .btn-modern{

            background:
                    linear-gradient(
                    135deg,
                    #4f46e5,
                    #06b6d4
                    );

            border:none;

            color:white;

            padding:14px 24px;

            border-radius:16px;

            font-weight:600;

            transition:0.35s ease;

            box-shadow:
                    0 10px 25px rgba(6,182,212,0.28);
        }

        .btn-modern:hover{

            transform:translateY(-3px);

            box-shadow:
                    0 14px 35px rgba(6,182,212,0.42);

            color:white;
        }

        /* CARD */

        .glass-card{

            background:
                    rgba(255,255,255,0.08);

            backdrop-filter:blur(18px);

            border-radius:28px;

            border:
                    1px solid rgba(255,255,255,0.08);

            box-shadow:
                    0 15px 40px rgba(0,0,0,0.45);

            overflow:hidden;

            animation:fadeUp 0.8s ease;
        }

        @keyframes fadeUp{

            from{

                opacity:0;

                transform:translateY(30px);
            }

            to{

                opacity:1;

                transform:translateY(0);
            }
        }

        /* CARD HEADER */

        .glass-card .card-header{

            background:
                    rgba(255,255,255,0.04) !important;

            border-bottom:
                    1px solid rgba(255,255,255,0.06);

            color:white;

            font-size:1.15rem;

            font-weight:600;

            padding:24px;
        }

        .glass-card .card-body{

            padding:28px;
        }

        /* TABLE */

        .table{

            width:100% !important;

            color:white !important;

            background:transparent !important;

            margin-bottom:0;

            border-collapse:separate;

            border-spacing:0 14px;
        }

        /* TABLE HEADINGS */

        .table thead th{

            background:transparent !important;

            color:#ffffff !important;

            font-size:0.95rem;

            font-weight:700 !important;

            text-transform:uppercase;

            letter-spacing:1px;

            padding:18px;

            border:none;
        }

        /* TABLE ROW */

        .table tbody tr{

            background:
                    rgba(15,23,42,0.82);

            backdrop-filter:blur(12px);

            border-radius:16px;

            transition:all 0.35s ease;
        }

        /* HOVER */

        .table tbody tr:hover{

            background:
                    rgba(30,41,59,0.95);

            transform:translateY(-3px);
        }

        /* TABLE DATA */

        .table tbody td{

            background:transparent !important;

            color:#ffffff !important;

            font-size:1rem;

            font-weight:500;

            padding:22px 18px;

            vertical-align:middle;

            border:none;
        }

        /* COURSE NAME */

        .table tbody td strong{

            color:#ffffff;

            font-weight:700;

            font-size:1rem;
        }

        /* ROUNDED CORNERS */

        .table tbody tr td:first-child{

            border-radius:16px 0 0 16px;
        }

        .table tbody tr td:last-child{

            border-radius:0 16px 16px 0;
        }

        /* COURSE CODE */

        .course-code{

            background:
                    linear-gradient(
                    135deg,
                    #3b82f6,
                    #8b5cf6
                    );

            color:white;

            padding:8px 16px;

            border-radius:30px;

            font-size:0.82rem;

            font-weight:600;

            display:inline-block;
        }

        /* ACTION BUTTONS */

        .action-btn{

            width:44px;
            height:44px;

            border:none;

            border-radius:14px;

            display:inline-flex;

            justify-content:center;

            align-items:center;

            transition:0.35s ease;
        }

        .action-btn:hover{

            transform:translateY(-3px) scale(1.05);
        }

        .view-btn{

            background:
                    linear-gradient(
                    135deg,
                    #06b6d4,
                    #3b82f6
                    );

            color:white;
        }

        .edit-btn{

            background:
                    linear-gradient(
                    135deg,
                    #f59e0b,
                    #f97316
                    );

            color:white;
        }

        /* ALERT */

        .alert-success{

            background:
                    rgba(34,197,94,0.14);

            border:
                    1px solid rgba(34,197,94,0.28);

            color:#bbf7d0;

            border-radius:16px;

            backdrop-filter:blur(12px);

            padding:16px;
        }

        /* PAGINATION */

        .pagination .page-link{

            background:
                    rgba(255,255,255,0.08);

            border:none;

            color:white;

            margin:0 5px;

            border-radius:12px;

            transition:0.3s ease;
        }

        .pagination .page-link:hover{

            background:#3b82f6;

            transform:translateY(-2px);
        }

        .pagination .active .page-link{

            background:
                    linear-gradient(
                    135deg,
                    #4f46e5,
                    #06b6d4
                    );

            color:white;

            box-shadow:
                    0 8px 20px rgba(6,182,212,0.35);
        }

        /* EMPTY STATE */

        .empty-state{

            text-align:center;

            padding:60px 20px;

            color:rgba(255,255,255,0.8);
        }

        .empty-state i{

            font-size:4rem;

            margin-bottom:15px;

            color:#38bdf8;
        }

        /* RESPONSIVE */

        @media(max-width:768px){

            .dashboard-header{

                flex-direction:column;

                gap:20px;

                align-items:flex-start;
            }

            .dashboard-title{

                font-size:1.8rem;
            }

            .table{

                min-width:760px;
            }
        }

    </style>

</head>

<body>

<!-- GLOW -->

<div class="glow one"></div>
<div class="glow two"></div>

<div class="d-flex" id="wrapper">

    <!-- Sidebar -->

    <div th:replace="~{fragments/layout :: sidebar}"></div>

    <!-- Page Content -->

    <div id="page-content-wrapper">

        <!-- Navbar -->

        <div th:replace="~{fragments/layout :: navbar}"></div>

        <div class="container-fluid px-4 py-4">

            <!-- HEADER -->

            <div class="dashboard-header">

                <h2 class="dashboard-title">

                    <i class="bi bi-journal-richtext"></i>

                    Courses

                </h2>

                <a th:href="@{/course/new}"
                   class="btn btn-modern">

                    <i class="bi bi-plus-lg me-2"></i>

                    Add New Course

                </a>

            </div>

            <!-- ALERT -->

            <div th:if="${message}"
                 class="alert alert-success text-center mb-4"
                 role="alert"
                 th:text="${message}">
            </div>

            <!-- CARD -->

            <div class="card glass-card">

                <!-- HEADER -->

                <div class="card-header">

                    <i class="bi bi-grid-1x2-fill me-2"></i>

                    Course List

                </div>

                <!-- BODY -->

                <div class="card-body">

                    <!-- EMPTY STATE -->

                    <div class="empty-state"
                         th:if="${courses.content.isEmpty()}">

                        <i class="bi bi-folder-x"></i>

                        <h4>No Courses Found</h4>

                        <p>
                            Start by adding your first course.
                        </p>

                    </div>

                    <!-- TABLE -->

                    <div class="table-responsive"
                         th:if="${!courses.content.isEmpty()}">

                        <table class="table align-middle">

                            <thead>

                            <tr>

                                <th>ID</th>

                                <th>Course Name</th>

                                <th>Course Code</th>

                                <th>Course Fees</th>

                                <th>Duration</th>

                                <th>Actions</th>

                            </tr>

                            </thead>

                            <tbody>

                            <tr th:each="course : ${courses.content}">

                                <!-- ID -->

                                <td th:text="${course.id}"></td>

                                <!-- NAME -->

                                <td>

                                    <strong th:text="${course.courseName}">
                                    </strong>

                                </td>

                                <!-- CODE -->

                                <td>

                                    <span class="course-code"
                                          th:text="${course.courseCode}">
                                    </span>

                                </td>

                                <!-- FEES -->

                                <td>

                                    ₹
                                    <span th:text="${course.fee}"></span>

                                </td>

                                <!-- DURATION -->

                                <td th:text="${course.duration}">
                                </td>

                                <!-- ACTIONS -->

                                <td>

                                    <!-- VIEW -->

                                    <a th:href="@{'/course/' + ${course.id}}"
                                       class="action-btn view-btn me-2"
                                       title="View">

                                        <i class="bi bi-eye-fill"></i>

                                    </a>

                                    <!-- EDIT -->

                                    <a th:href="@{/course/{id}/edit(id=${course.id})}"
                                       class="action-btn edit-btn"
                                       title="Edit">

                                        <i class="bi bi-pencil-fill"></i>

                                    </a>

                                </td>

                            </tr>

                            </tbody>

                        </table>

                    </div>

                    <!-- PAGINATION -->

                    <nav th:if="${courses.totalPages > 1}"
                         class="mt-4">

                        <ul class="pagination justify-content-end">

                            <!-- PREVIOUS -->

                            <li class="page-item"
                                th:classappend="${courses.first} ? 'disabled'">

                                <a class="page-link"
                                   th:href="@{'/course/list'(page=${courses.number > 0 ? courses.number-1 : 0}, size=${courses.size})}">

                                    Previous

                                </a>

                            </li>

                            <!-- PAGE NUMBERS -->

                            <li class="page-item"
                                th:each="pageNum : ${#numbers.sequence(0, courses.totalPages-1)}"
                                th:classappend="${pageNum} == ${courses.number} ? 'active' : ''">

                                <a class="page-link"
                                   th:href="@{'/course/list'(page=${pageNum}, size=${courses.size})}"
                                   th:text="${pageNum + 1}">
                                </a>

                            </li>

                            <!-- NEXT -->

                            <li class="page-item"
                                th:classappend="${courses.last} ? 'disabled'">

                                <a class="page-link"
                                   th:href="@{'/course/list'(page=${courses.last ? courses.number : courses.number+1}, size=${courses.size})}">

                                    Next

                                </a>

                            </li>

                        </ul>

                    </nav>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Scripts -->

<div th:replace="~{fragments/layout :: scripts}"></div>

</body>

</html>
