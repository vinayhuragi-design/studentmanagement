<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>SMS Portal • Login</title>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{

            /* ===== Elegant Neutral Theme ===== */

            --white:#ffffff;

            --text:#f8fafc;
            --muted:#cbd5e1;

            --input-bg:rgba(255,255,255,.05);

            --input-border:rgba(255,255,255,.10);

            --glass:rgba(15,23,42,.55);

            --glass-border:rgba(255,255,255,.08);

            --button:#d9b8a0;
            --button-hover:#cda388;

            --shadow:
                    0 20px 60px rgba(0,0,0,.45);

        }

        body{

            font-family:'Inter',sans-serif;

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            overflow:hidden;

            position:relative;

            padding:20px;

            background:
                    linear-gradient(
                            rgba(8,15,30,.72),
                            rgba(8,15,30,.82)
                    ),

                    url('https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=1920&auto=format&fit=crop');

            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;

        }

        /* ===== Overlay Glow ===== */

        body::before{

            content:"";

            position:absolute;

            inset:0;

            background:

                    radial-gradient(
                            circle at top left,
                            rgba(255,255,255,.06),
                            transparent 30%
                    ),

                    radial-gradient(
                            circle at bottom right,
                            rgba(217,184,160,.12),
                            transparent 35%
                    );

            z-index:0;

        }

        /* ===== Wrapper ===== */

        .login-wrapper{

            position:relative;

            z-index:10;

            width:100%;
            max-width:500px;

        }

        /* ===== Brand ===== */

        .brand{

            text-align:center;

            margin-bottom:18px;

            color:white;

        }

        .brand-icon{

            width:82px;
            height:82px;

            margin:auto auto 18px;

            border-radius:26px;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
                    rgba(255,255,255,.08);

            backdrop-filter:blur(12px);

            border:1px solid rgba(255,255,255,.10);

            font-size:32px;

            color:white;

            box-shadow:
                    0 10px 30px rgba(0,0,0,.35);

        }

        .brand h1{

            font-size:40px;

            font-weight:700;

            letter-spacing:-1px;

        }

        .brand p{

            margin-top:10px;

            font-size:15px;

            color:rgba(255,255,255,.82);

            font-weight:400;

        }

        .brand-line{

            width:120px;
            height:5px;

            margin:18px auto 0;

            border-radius:16px;

            background:
                    linear-gradient(
                            90deg,
                            rgba(217,184,160,.95),
                            rgba(255,255,255,.18)
                    );

        }
        
        

        /* ===== Login Card ===== */

        .login-card{

            background:rgba(15,23,42,.55);

            border:1px solid rgba(255,255,255,.08);

            border-radius:32px;

            padding:42px;

            backdrop-filter:blur(18px);

            -webkit-backdrop-filter:blur(18px);

            box-shadow:var(--shadow);

            animation:fadeUp .5s ease;

            position:relative;

            overflow:hidden;

            transition:.4s ease;

        }

        .login-card:hover{

            transform:translateY(-2px);

        }

        /* ===== Glass Shine ===== */

        .login-card::before{

            content:"";

            position:absolute;

            top:0;
            left:-60%;

            width:220px;
            height:100%;

            background:
                    linear-gradient(
                            90deg,
                            transparent,
                            rgba(255,255,255,.06),
                            transparent
                    );

            transform:skewX(-20deg);

        }

        @keyframes fadeUp{

            from{
                opacity:0;
                transform:translateY(25px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

        /* ===== Heading ===== */

        .card-heading{

            text-align:center;

            margin-bottom:30px;

        }

        .card-heading h2{

            color:white;

            font-size:34px;

            font-weight:600;

        }

        .card-heading p{

            margin-top:12px;

            color:rgba(255,255,255,.70);

            font-size:14px;

        }

        /* ===== Alerts ===== */

        .alert{

            display:flex;
            align-items:center;

            gap:12px;

            padding:14px 16px;

            border-radius:16px;

            margin-bottom:16px;

            font-size:13px;

            color:white;

            backdrop-filter:blur(8px);

        }

        .alert-error{

            background:rgba(239,68,68,.14);

            border:1px solid rgba(239,68,68,.16);

        }

        .alert-success{

            background:rgba(34,197,94,.14);

            border:1px solid rgba(34,197,94,.16);

        }

        .alert i{

            font-size:16px;

        }

        /* ===== Fields ===== */

        .field{

            margin-bottom:18px;

        }

        .input-box{

            position:relative;

        }

        .input-icon{

            position:absolute;

            top:50%;
            left:18px;

            transform:translateY(-50%);

            color:rgba(255,255,255,.68);

            font-size:16px;

        }

        .toggle-password{

            position:absolute;

            top:50%;
            right:18px;

            transform:translateY(-50%);

            color:rgba(255,255,255,.70);

            cursor:pointer;

            font-size:16px;

        }

        .form-input{

            width:100%;

            height:58px;

            border:none;
            outline:none;

            border-radius:18px;

            background:rgba(255,255,255,.05);

            border:1px solid rgba(255,255,255,.08);

            padding:0 50px 0 50px;

            color:white;

            font-size:15px;

            font-family:'Inter',sans-serif;

            transition:.3s ease;

            backdrop-filter:blur(10px);

        }

        .form-input::placeholder{

            color:rgba(255,255,255,.48);

            background:transparent;

        }

        .form-input:focus{

            border-color:rgba(217,184,160,.45);

            background:rgba(255,255,255,.08);

            box-shadow:
                    0 0 0 4px rgba(217,184,160,.08);

        }

        /* ===== Autofill Fix ===== */

        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active{

            -webkit-box-shadow:
                    0 0 0 1000px rgba(255,255,255,.05) inset !important;

            box-shadow:
                    0 0 0 1000px rgba(255,255,255,.05) inset !important;

            -webkit-text-fill-color:#ffffff !important;

            border:1px solid rgba(255,255,255,.08) !important;

            transition:background-color 9999s ease-in-out 0s;

        }

        /* ===== Options ===== */

        .options{

            display:flex;
            justify-content:space-between;
            align-items:center;

            margin-top:8px;
            margin-bottom:28px;

        }

        .remember{

            display:flex;
            align-items:center;

            gap:8px;

            color:rgba(255,255,255,.78);

            font-size:13px;

        }

        .remember input{

            accent-color:#d9b8a0;

        }

        .forgot{

            text-decoration:none;

            color:#f0ccb8;

            font-size:13px;

            font-weight:500;

            transition:.25s ease;

        }

        .forgot:hover{

            color:white;

        }

        /* ===== Button ===== */

        .btn-login{

            width:100%;

            height:58px;

            border:none;

            border-radius:18px;

            cursor:pointer;

            background:
                    linear-gradient(
                            135deg,
                            #d9b8a0,
                            #cda388
                    );

            color:#1e293b;

            font-size:15px;

            font-weight:700;

            font-family:'Inter',sans-serif;

            transition:.3s ease;

            display:flex;
            justify-content:center;
            align-items:center;

            gap:10px;

            box-shadow:
                    0 12px 24px rgba(0,0,0,.28);

        }

        .btn-login:hover{

            transform:translateY(-2px);

            box-shadow:
                    0 18px 34px rgba(0,0,0,.35);

        }

        .btn-login:active{

            transform:translateY(0);

        }

        .btn-login:disabled{

            opacity:.7;

            cursor:not-allowed;

        }

        /* ===== Footer ===== */

        .footer{

            margin-top:28px;

            text-align:center;

            color:rgba(255,255,255,.68);

            font-size:12px;

            line-height:1.8;

        }

        .footer span{

            color:#f4d1be;

            font-weight:600;

        }

        /* ===== Responsive ===== */

        @media(max-width:520px){

            .login-card{

                padding:30px 22px;

                border-radius:26px;

            }

            .brand h1{

                font-size:32px;

            }

            .card-heading h2{

                font-size:26px;

            }

        }

    </style>

</head>

<body>

<!-- Wrapper -->
<div class="login-wrapper">

    <!-- Brand -->
    <div class="brand">

        <div class="brand-icon">
            <i class="bi bi-mortarboard-fill"></i>
        </div>

        <h1>SMS Portal</h1>

        <p>
            Student Management System
        </p>

        <div class="brand-line"></div>

    </div>

    <!-- Login Card -->
    <div class="login-card">

        <!-- Heading -->
        <div class="card-heading">

            <h2>Login to your account</h2>

            <p>
                Enter your credentials to continue
            </p>

        </div>

        <!-- Error -->
        <div th:if="${param.error}"
             class="alert alert-error">

            <i class="bi bi-exclamation-circle-fill"></i>

            <span>
                Invalid username or password
            </span>

        </div>

        <!-- Logout -->
        <div th:if="${param.logout}"
             class="alert alert-success">

            <i class="bi bi-check-circle-fill"></i>

            <span>
                Logged out successfully
            </span>

        </div>

        <!-- Message -->
        <div th:if="${message}"
             class="alert alert-error">

            <i class="bi bi-info-circle-fill"></i>

            <span th:text="${message}"></span>

        </div>

        <!-- Login Form -->
        <form th:action="@{/login}"
              method="post"
              id="loginForm">

            <!-- CSRF -->
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <!-- Username -->
            <div class="field">

                <div class="input-box">

                    <span class="input-icon">
                        <i class="bi bi-person"></i>
                    </span>

                    <input type="text"
                           id="username"
                           name="username"
                           class="form-input"
                           placeholder="Username"
                           autocomplete="username"
                           autofocus
                           required>

                </div>

            </div>

            <!-- Password -->
            <div class="field">

                <div class="input-box">

                    <span class="input-icon">
                        <i class="bi bi-lock"></i>
                    </span>

                    <input type="password"
                           id="password"
                           name="password"
                           class="form-input"
                           placeholder="Password"
                           autocomplete="current-password"
                           required>

                    <span class="toggle-password"
                          onclick="togglePassword()">

                        <i class="bi bi-eye"
                           id="toggleIcon"></i>

                    </span>

                </div>

            </div>

            <!-- Options -->
            <div class="options">

                <label class="remember">

                    <input type="checkbox"
                           name="remember-me">

                    Remember Me

                </label>

                <a href="#"
                   class="forgot">

                    Forgot Password?

                </a>

            </div>

            <!-- Submit -->
            <button type="submit"
                    class="btn-login"
                    id="loginButton">

                <span id="buttonText">

                    SIGN IN

                    <i class="bi bi-arrow-right"></i>

                </span>

            </button>

        </form>

        <!-- Footer -->
        <div class="footer">

            Secured by <span>SMS Admin</span>

            <br>

            © 2026 All rights reserved.

        </div>

    </div>

</div>

<!-- Scripts -->
<script>

    // Toggle Password

    function togglePassword(){

        const password =
            document.getElementById("password");

        const icon =
            document.getElementById("toggleIcon");

        if(password.type === "password"){

            password.type = "text";

            icon.classList.remove("bi-eye");
            icon.classList.add("bi-eye-slash");

        }else{

            password.type = "password";

            icon.classList.remove("bi-eye-slash");
            icon.classList.add("bi-eye");

        }

    }

    // Button Loading State

    document.getElementById("loginForm")
        .addEventListener("submit", function(){

            document.getElementById("buttonText")
                .innerHTML =
                `Signing In...`;

            document.getElementById("loginButton")
                .disabled = true;

        });

</script>

</body>

</html>
