<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <th:block th:replace="~{fragments/layout :: head}"></th:block>

    <title>Add New Course</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{

            --primary:#7c3aed;
            --secondary:#4f46e5;
            --success:#10b981;
            --info:#06b6d4;
            --warning:#f59e0b;

            --dark:#0f172a;
            --dark2:#1e293b;

            --white:#ffffff;

            --glass:rgba(255,255,255,.18);

            --shadow:
                    0 25px 50px rgba(15,23,42,.18);

        }

        body{

            font-family:'Poppins',sans-serif;

            background:
                    linear-gradient(
                            135deg,
                            #eef2ff 0%,
                            #f8fafc 20%,
                            #ede9fe 40%,
                            #ecfeff 60%,
                            #fefce8 100%
                    );

            background-size:400% 400%;

            animation:bgMove 16s ease infinite;

            min-height:100vh;

            overflow-x:hidden;

            color:#0f172a;

            position:relative;

        }

        @keyframes bgMove{

            0%{
                background-position:0% 50%;
            }

            50%{
                background-position:100% 50%;
            }

            100%{
                background-position:0% 50%;
            }

        }

        /* =========================================
           BACKGROUND GRID
        ========================================= */

        body::before{

            content:'';

            position:fixed;

            inset:0;

            background-image:

                    linear-gradient(
                            rgba(255,255,255,.35) 1px,
                            transparent 1px
                    ),

                    linear-gradient(
                            90deg,
                            rgba(255,255,255,.35) 1px,
                            transparent 1px
                    );

            background-size:40px 40px;

            z-index:-3;

            opacity:.35;

        }

        /* =========================================
           FLOATING ORBS
        ========================================= */

        .orb{

            position:fixed;

            border-radius:50%;

            filter:blur(90px);

            z-index:-2;

            animation:float 10s ease-in-out infinite;

        }

        .orb1{

            width:350px;
            height:350px;

            background:rgba(124,58,237,.30);

            top:-120px;
            left:-100px;

        }

        .orb2{

            width:280px;
            height:280px;

            background:rgba(59,130,246,.22);

            right:-100px;
            top:30%;

            animation-delay:2s;

        }

        .orb3{

            width:260px;
            height:260px;

            background:rgba(16,185,129,.18);

            bottom:-80px;
            left:35%;

            animation-delay:4s;

        }

        .orb4{

            width:220px;
            height:220px;

            background:rgba(245,158,11,.20);

            top:65%;
            right:20%;

            animation-delay:6s;

        }

        @keyframes float{

            0%,100%{
                transform:translateY(0px) translateX(0px);
            }

            50%{
                transform:translateY(-30px) translateX(20px);
            }

        }

        /* =========================================
           WRAPPER
        ========================================= */

        #wrapper{
            display:flex;
            min-height:100vh;
        }

        #page-content-wrapper{
            flex:1;
            min-width:0;
            position:relative;
        }

        /* =========================================
           PAGE HEADER
        ========================================= */

        .page-header{

            position:relative;

            overflow:hidden;

            background:
                    linear-gradient(
                            135deg,
                            rgba(15,23,42,.96),
                            rgba(30,41,59,.92),
                            rgba(79,70,229,.88)
                    );

            border-radius:32px;

            padding:40px;

            margin-bottom:30px;

            box-shadow:var(--shadow);

        }

        .page-header::before{

            content:'';

            position:absolute;

            inset:0;

            background:

                    radial-gradient(
                            circle at top left,
                            rgba(124,58,237,.40),
                            transparent 35%
                    ),

                    radial-gradient(
                            circle at bottom right,
                            rgba(16,185,129,.25),
                            transparent 35%
                    );

        }

        .page-header-content{

            position:relative;

            z-index:2;

            display:flex;

            justify-content:space-between;

            align-items:center;

            flex-wrap:wrap;

            gap:20px;

        }

        .page-title{

            font-size:2.5rem;

            font-weight:700;

            color:white;

            margin-bottom:10px;
        }

        .page-subtitle{

            color:rgba(255,255,255,.75);

            font-size:15px;
        }

        /* =========================================
           BUTTONS
        ========================================= */

        .btn-modern{

            border:none;

            border-radius:16px;

            padding:14px 24px;

            font-weight:600;

            transition:.3s ease;

            text-decoration:none;

            display:inline-flex;

            align-items:center;

            gap:10px;

            cursor:pointer;
        }

        .btn-back{

            background:rgba(255,255,255,.12);

            backdrop-filter:blur(10px);

            border:1px solid rgba(255,255,255,.15);

            color:white;
        }

        .btn-back:hover{

            background:rgba(255,255,255,.20);

            transform:translateY(-3px);

            color:white;
        }

        .btn-save{

            background:
                    linear-gradient(
                            135deg,
                            #8b5cf6,
                            #6366f1
                    );

            color:white;

            box-shadow:
                    0 15px 30px rgba(99,102,241,.35);
        }

        .btn-save:hover{

            transform:translateY(-4px);

            color:white;

            box-shadow:
                    0 18px 35px rgba(99,102,241,.45);
        }

        .btn-reset{

            background:#f1f5f9;

            color:#334155;
        }

        .btn-reset:hover{

            background:#e2e8f0;

            transform:translateY(-2px);
        }

        /* =========================================
           FORM CARD
        ========================================= */

        .form-card{

            position:relative;

            overflow:hidden;

            background:rgba(255,255,255,.72);

            backdrop-filter:blur(18px);

            border-radius:32px;

            border:1px solid rgba(255,255,255,.55);

            box-shadow:var(--shadow);

            animation:fadeUp .8s ease;

        }

        .form-card::before{

            content:'';

            position:absolute;

            inset:0;

            background:
                    linear-gradient(
                            135deg,
                            rgba(124,58,237,.04),
                            rgba(6,182,212,.03),
                            rgba(16,185,129,.03)
                    );

            pointer-events:none;
        }

        .form-header{

            position:relative;

            z-index:2;

            padding:24px 30px;

            border-bottom:1px solid rgba(0,0,0,.05);

            background:
                    linear-gradient(
                            135deg,
                            rgba(255,255,255,.85),
                            rgba(248,250,252,.75)
                    );
        }

        .form-header h5{

            margin:0;

            font-size:1.2rem;

            font-weight:700;

            display:flex;

            align-items:center;

            gap:12px;

            color:#0f172a;
        }

        .form-body{

            position:relative;

            z-index:2;

            padding:32px;
        }

        /* =========================================
           FORM CONTROLS
        ========================================= */

        .form-label{

            font-weight:600;

            margin-bottom:10px;

            color:#0f172a;
        }

        .form-control{

            border-radius:18px;

            padding:15px 18px;

            border:1px solid rgba(148,163,184,.25);

            background:rgba(255,255,255,.75);

            transition:.3s ease;

            font-size:14px;
        }

        .form-control:focus{

            border-color:#7c3aed;

            background:white;

            box-shadow:
                    0 0 0 5px rgba(124,58,237,.12);
        }

        textarea.form-control{
            resize:none;
        }

        /* =========================================
           INVALID FEEDBACK
        ========================================= */

        .invalid-feedback{

            display:block;

            margin-top:8px;

            font-size:13px;
        }

        /* =========================================
           ACTIONS
        ========================================= */

        .form-actions{

            display:flex;

            justify-content:flex-end;

            gap:14px;

            margin-top:28px;

            flex-wrap:wrap;
        }

        /* =========================================
           ANIMATION
        ========================================= */

        @keyframes fadeUp{

            from{
                opacity:0;
                transform:translateY(25px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

        /* =========================================
           RESPONSIVE
        ========================================= */

        @media(max-width:768px){

            .page-header{
                padding:28px;
            }

            .page-title{
                font-size:2rem;
            }

            .form-body{
                padding:22px;
            }

        }

    </style>

</head>

<body>

<!-- BACKGROUND ORBS -->
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="orb orb4"></div>

<div class="d-flex" id="wrapper">

    <!-- SIDEBAR -->
    <div th:replace="~{fragments/layout :: sidebar}"></div>

    <!-- PAGE CONTENT -->
    <div id="page-content-wrapper">

        <!-- NAVBAR -->
        <div th:replace="~{fragments/layout :: navbar}"></div>

        <!-- MAIN -->
        <div class="container-fluid px-4 py-4">

            <!-- HEADER -->
            <div class="page-header">

                <div class="page-header-content">

                    <div>

                        <h1 class="page-title">

                            <i class="bi bi-journal-plus me-2"></i>

                            Add New Course

                        </h1>

                        <p class="page-subtitle">

                            Create professional course details with modern UI styling.

                        </p>

                    </div>

                    <a th:href="@{/course/list}"
                       class="btn-modern btn-back">

                        <i class="bi bi-arrow-left"></i>

                        Back to List

                    </a>

                </div>

            </div>

            <!-- FORM CARD -->
            <div class="form-card">

                <!-- HEADER -->
                <div class="form-header">

                    <h5>

                        <i class="bi bi-book-half"></i>

                        Course Details

                    </h5>

                </div>

                <!-- BODY -->
                <div class="form-body">

                    <form th:action="@{/course}"
                          th:object="${courseDto}"
                          method="post">

                        <div class="row g-4">

                            <!-- COURSE NAME -->
                            <div class="col-md-6">

                                <label class="form-label">
                                    Course Name
                                </label>

                                <input type="text"
                                       th:field="*{courseName}"
                                       class="form-control"
                                       placeholder="e.g. Web Development">

                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('courseName')}"
                                     th:errors="*{courseName}">
                                </div>

                            </div>

                            <!-- COURSE CODE -->
                            <div class="col-md-6">

                                <label class="form-label">
                                    Course Code
                                </label>

                                <input type="text"
                                       th:field="*{courseCode}"
                                       class="form-control"
                                       placeholder="e.g. WEB101">

                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('courseCode')}"
                                     th:errors="*{courseCode}">
                                </div>

                            </div>

                            <!-- DURATION -->
                            <div class="col-md-6">

                                <label class="form-label">
                                    Duration
                                </label>

                                <input type="text"
                                       th:field="*{duration}"
                                       class="form-control"
                                       placeholder="e.g. 6 Months">

                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('duration')}"
                                     th:errors="*{duration}">
                                </div>

                            </div>

                            <!-- FEE -->
                            <div class="col-md-6">

                                <label class="form-label">
                                    Course Fee
                                </label>

                                <input type="number"
                                       step="0.01"
                                       min="0"
                                       th:field="*{fee}"
                                       class="form-control"
                                       placeholder="e.g. 1200">

                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('fee')}"
                                     th:errors="*{fee}">
                                </div>

                            </div>

                            <!-- DESCRIPTION -->
                            <div class="col-12">

                                <label class="form-label">
                                    Description
                                </label>

                                <textarea th:field="*{description}"
                                          rows="5"
                                          class="form-control"
                                          placeholder="Enter course description..."></textarea>

                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('description')}"
                                     th:errors="*{description}">
                                </div>

                            </div>

                        </div>

                        <!-- ACTIONS -->
                        <div class="form-actions">

                            <button type="reset"
                                    class="btn-modern btn-reset">

                                Reset

                            </button>

                            <button type="submit"
                                    class="btn-modern btn-save">

                                <i class="bi bi-save"></i>

                                Save Course

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- SCRIPTS -->
<div th:replace="~{fragments/layout :: scripts}"></div>

</body>

</html>
