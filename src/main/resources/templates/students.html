<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <!-- Thymeleaf Head Fragment -->
    <th:block th:replace="~{fragments/layout :: head}"></th:block>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Students Management</title>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Poppins',sans-serif;

            background:
                    linear-gradient(
                            135deg,
                            #f8fafc,
                            #eef2ff,
                            #f1f5f9
                    );

            min-height:100vh;

            overflow-x:hidden;

            color:#111827;

        }

        :root{

            --primary:#7c3aed;
            --secondary:#6366f1;
            --success:#10b981;
            --dark:#0f172a;

            --shadow:
                    0 15px 40px rgba(0,0,0,.08);

        }

        #wrapper{
            display:flex;
            min-height:100vh;
        }

        #page-content-wrapper{
            flex:1;
            width:100%;
            overflow-x:hidden;
        }

        /* ========================================
           HERO SECTION
        ======================================== */

        .hero{

            margin:24px;

            border-radius:30px;

            background:
                    linear-gradient(
                            135deg,
                            #111827,
                            #1e1b4b,
                            #312e81
                    );

            padding:45px;

            color:white;

            position:relative;

            overflow:hidden;

            box-shadow:
                    0 20px 40px rgba(0,0,0,.15);

        }

        .hero::before{

            content:'';

            position:absolute;

            inset:0;

            background:
                    radial-gradient(circle at top left,
                    rgba(124,58,237,.35),
                    transparent 35%),

                    radial-gradient(circle at bottom right,
                    rgba(99,102,241,.25),
                    transparent 30%);

        }

        .hero-content{

            position:relative;

            z-index:2;

            display:flex;

            justify-content:space-between;

            align-items:center;

            flex-wrap:wrap;

            gap:20px;

        }

        .hero-title{

            font-size:3rem;

            font-weight:700;

            margin-bottom:12px;

        }

        .hero-subtitle{

            color:rgba(255,255,255,.75);

            margin-bottom:18px;

            font-size:15px;

        }

        .hero-badge{

            display:inline-flex;

            align-items:center;

            gap:10px;

            padding:10px 18px;

            border-radius:100px;

            background:rgba(255,255,255,.10);

            border:1px solid rgba(255,255,255,.15);

            font-size:14px;

        }

        .hero-btn{

            display:inline-flex;

            align-items:center;

            gap:10px;

            padding:14px 24px;

            border-radius:100px;

            background:
                    linear-gradient(
                            135deg,
                            #8b5cf6,
                            #6366f1
                    );

            color:white;

            text-decoration:none;

            font-weight:600;

            transition:.3s ease;

            box-shadow:
                    0 10px 25px rgba(99,102,241,.35);

        }

        .hero-btn:hover{

            transform:translateY(-3px);

            color:white;

        }

        /* ========================================
           PAGE BODY
        ======================================== */

        .page-body{
            padding:0 24px 30px;
        }

        /* ========================================
           FILTER CHIPS
        ======================================== */

        .chip-row{

            display:flex;

            gap:12px;

            flex-wrap:wrap;

            margin-bottom:20px;

        }

        .chip{

            padding:10px 18px;

            border-radius:100px;

            background:white;

            border:1px solid #e2e8f0;

            font-size:13px;

            font-weight:600;

            cursor:pointer;

            transition:.3s ease;

        }

        .chip:hover,
        .chip.active{

            background:#ede9fe;

            color:#6d28d9;

            border-color:#c4b5fd;

        }

        /* ========================================
           ALERT
        ======================================== */

        .alert-modern{

            display:flex;

            align-items:center;

            gap:10px;

            padding:16px 20px;

            border-radius:16px;

            background:#ecfdf5;

            border-left:4px solid #10b981;

            margin-bottom:20px;

            color:#065f46;

            font-weight:500;

        }

        /* ========================================
           TABLE CARD
        ======================================== */

        .table-card{

            background:rgba(255,255,255,.88);

            backdrop-filter:blur(10px);

            border-radius:30px;

            overflow:hidden;

            box-shadow:var(--shadow);

        }

        .table-header{

            padding:22px 28px;

            display:flex;

            justify-content:space-between;

            align-items:center;

            flex-wrap:wrap;

            gap:15px;

            border-bottom:1px solid rgba(0,0,0,.05);

        }

        .table-title{

            display:flex;

            align-items:center;

            gap:12px;

            font-size:1.2rem;

            font-weight:700;

        }

        .badge-total{

            padding:6px 14px;

            border-radius:100px;

            background:#ede9fe;

            color:#6d28d9;

            font-size:12px;

            font-weight:700;

        }

        /* ========================================
           SEARCH
        ======================================== */

        .search-box{
            position:relative;
        }

        .search-box input{

            width:260px;

            padding:12px 18px 12px 45px;

            border:none;

            outline:none;

            border-radius:100px;

            background:#f8fafc;

            border:1px solid #e2e8f0;

        }

        .search-box input:focus{

            border-color:#8b5cf6;

            box-shadow:
                    0 0 0 4px rgba(139,92,246,.15);

        }

        .search-box i{

            position:absolute;

            top:50%;
            left:16px;

            transform:translateY(-50%);

            color:#94a3b8;

        }

        /* ========================================
           TABLE
        ======================================== */

        .table-responsive{
            overflow-x:auto;
        }

        .students-table{

            width:100%;

            border-collapse:collapse;

            min-width:900px;

        }

        .students-table thead{

            background:
                    linear-gradient(
                            135deg,
                            #111827,
                            #1e293b
                    );

        }

        .students-table th{

            padding:18px;

            color:rgba(255,255,255,.75);

            text-transform:uppercase;

            letter-spacing:1px;

            font-size:12px;

            text-align:left;

        }

        .students-table td{

            padding:18px;

            border-bottom:1px solid rgba(0,0,0,.05);

            vertical-align:middle;

            font-size:14px;

        }

        .students-table tbody tr{

            transition:.3s ease;

        }

        .students-table tbody tr:hover{

            background:rgba(124,58,237,.04);

        }

        /* ========================================
           ID BADGE
        ======================================== */

        .id-badge{

            padding:6px 12px;

            border-radius:10px;

            background:#f1f5f9;

            border:1px solid #e2e8f0;

            font-size:12px;

            font-weight:700;

            color:#475569;

        }

        /* ========================================
           STUDENT CELL
        ======================================== */

        .student-cell{

            display:flex;

            align-items:center;

            gap:12px;

        }

        .avatar{

            width:46px;
            height:46px;

            border-radius:14px;

            display:flex;

            align-items:center;

            justify-content:center;

            background:
                    linear-gradient(
                            135deg,
                            #8b5cf6,
                            #6366f1
                    );

            color:white;

            font-weight:700;

            box-shadow:
                    0 10px 20px rgba(99,102,241,.20);

        }

        .student-name{

            font-weight:700;

            font-size:14px;

        }

        .student-role{

            font-size:12px;

            color:#64748b;

        }

        /* ========================================
           CONTACT CHIP
        ======================================== */

        .contact-chip{

            display:inline-flex;

            align-items:center;

            gap:8px;

            color:#334155;

            font-size:13px;

        }

        .contact-chip i{
            color:#94a3b8;
        }

        /* ========================================
           ACTION BUTTONS
        ======================================== */

        .actions-cell{

            display:flex;

            justify-content:center;

            gap:10px;

        }

        .act-btn{

            width:38px;
            height:38px;

            border-radius:12px;

            display:flex;

            align-items:center;

            justify-content:center;

            text-decoration:none;

            transition:.3s ease;

            border:1px solid rgba(0,0,0,.08);

            background:white;

            color:#475569;

        }

        .act-btn:hover{
            transform:translateY(-3px);
        }

        .view:hover{

            background:#ede9fe;

            color:#6d28d9;

        }

        .edit:hover{

            background:#ecfdf5;

            color:#059669;

        }

        /* ========================================
           FOOTER
        ======================================== */

        .table-footer{

            display:flex;

            justify-content:space-between;

            align-items:center;

            flex-wrap:wrap;

            gap:12px;

            padding:20px 24px;

            border-top:1px solid rgba(0,0,0,.05);

        }

        .footer-info{

            color:#64748b;

            font-size:14px;

        }

        /* ========================================
           PAGINATION
        ======================================== */

        .pagination{

            display:flex;

            gap:8px;

            list-style:none;

            margin:0;

            padding:0;

        }

        .page-link{

            width:38px;
            height:38px;

            border-radius:12px;

            display:flex;

            align-items:center;

            justify-content:center;

            text-decoration:none;

            border:1px solid #e2e8f0;

            background:white;

            color:#475569;

        }

        .page-item.active .page-link{

            background:#7c3aed;

            border-color:#7c3aed;

            color:white;

        }

        .page-link:hover{

            background:#ede9fe;

            color:#6d28d9;

        }

        .page-item.disabled .page-link{

            opacity:.4;

            pointer-events:none;

        }

        /* ========================================
           RESPONSIVE
        ======================================== */

        @media(max-width:768px){

            .hero{
                padding:28px;
                margin:16px;
            }

            .hero-title{
                font-size:2rem;
            }

            .page-body{
                padding:0 16px 24px;
            }

            .table-header{
                flex-direction:column;
                align-items:stretch;
            }

            .search-box input{
                width:100%;
            }

            .table-footer{
                flex-direction:column;
                align-items:flex-start;
            }

        }

    </style>

</head>

<body>

<div id="wrapper">

    <!-- SIDEBAR -->
    <div th:replace="~{fragments/layout :: sidebar}"></div>

    <!-- PAGE CONTENT -->
    <div id="page-content-wrapper">

        <!-- NAVBAR -->
        <div th:replace="~{fragments/layout :: navbar}"></div>

        <!-- HERO -->
        <div class="hero">

            <div class="hero-content">

                <div>

                    <h1 class="hero-title">
                        <i class="bi bi-people-fill"></i>
                        Students Management
                    </h1>

                    <p class="hero-subtitle">
                        Manage all student records with modern premium UI.
                    </p>

                    <div class="hero-badge">

                        <i class="bi bi-bar-chart-fill"></i>

                        Total Students :
                        <span th:text="${students.totalElements}">0</span>

                    </div>

                </div>

                <a th:href="@{/students/new}"
                   class="hero-btn">

                    <i class="bi bi-plus-circle-fill"></i>

                    Add New Student

                </a>

            </div>

        </div>

        <!-- PAGE BODY -->
        <div class="page-body">

            <!-- ALERT -->
            <div th:if="${message}"
                 class="alert-modern">

                <i class="bi bi-check-circle-fill"></i>

                <span th:text="${message}"></span>

            </div>

            <!-- TABLE CARD -->
            <div class="table-card">

                <!-- HEADER -->
                <div class="table-header">

                    <div class="table-title">

                        <i class="bi bi-table"></i>

                        Student List

                        <span class="badge-total">

                            <span th:text="${students.totalElements}"></span>
                            Total

                        </span>

                    </div>

                    <div class="search-box">

                        <i class="bi bi-search"></i>

                        <input type="text"
                               placeholder="Search students...">

                    </div>

                </div>

                <!-- TABLE -->
                <div class="table-responsive">

                    <table class="students-table">

                        <thead>

                        <tr>

                            <th>ID</th>
                            <th>Student</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th style="text-align:center;">Actions</th>

                        </tr>

                        </thead>

                        <tbody>

                        <tr th:each="student : ${students.content}">

                            <!-- ID -->
                            <td>

                                <span class="id-badge"
                                      th:text="|#${student.id}|"></span>

                            </td>

                            <!-- STUDENT -->
                            <td>

                                <div class="student-cell">

                                    <div class="avatar"
                                         th:text="${#strings.substring(student.firstName,0,1)}"></div>

                                    <div>

                                        <div class="student-name"
                                             th:text="|${student.firstName} ${student.lastName}|"></div>

                                        <div class="student-role">
                                            Student
                                        </div>

                                    </div>

                                </div>

                            </td>

                            <!-- EMAIL -->
                            <td>

                                <span class="contact-chip">

                                    <i class="bi bi-envelope"></i>

                                    <span th:text="${student.email}"></span>

                                </span>

                            </td>

                            <!-- PHONE -->
                            <td>

                                <span class="contact-chip">

                                    <i class="bi bi-telephone"></i>

                                    <span th:text="${student.phoneNumber}"></span>

                                </span>

                            </td>

                            <!-- ACTIONS -->
                            <td>

                                <div class="actions-cell">

                                    <a th:href="@{/students/{id}(id=${student.id})}"
                                       class="act-btn view">

                                        <i class="bi bi-eye"></i>

                                    </a>

                                    <a th:href="@{/students/{id}/edit(id=${student.id})}"
                                       class="act-btn edit">

                                        <i class="bi bi-pencil-square"></i>

                                    </a>

                                </div>

                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

                <!-- FOOTER -->
                <div class="table-footer"
                     th:if="${students.totalPages > 1}">

                    <span class="footer-info">

                        Showing
                        <strong th:text="${students.number * students.size + 1}"></strong>
                        -
                        <strong th:text="${students.number * students.size + students.numberOfElements}"></strong>

                        of

                        <strong th:text="${students.totalElements}"></strong>

                        students

                    </span>

                    <!-- PAGINATION -->
                    <nav>

                        <ul class="pagination">

                            <!-- PREVIOUS -->
                            <li class="page-item"
                                th:classappend="${students.first} ? 'disabled'">

                                <a class="page-link"
                                   th:href="@{'/students/list'(page=${students.first ? 0 : students.number -1}, size=${students.size})}">

                                    <i class="bi bi-chevron-left"></i>

                                </a>

                            </li>

                            <!-- PAGE NUMBERS -->
                            <li class="page-item"
                                th:each="pageNum : ${#numbers.sequence(0, students.totalPages -1)}"
                                th:classappend="${pageNum == students.number} ? 'active'">

                                <a class="page-link"
                                   th:href="@{'/students/list'(page=${pageNum}, size=${students.size})}"
                                   th:text="${pageNum +1}"></a>

                            </li>

                            <!-- NEXT -->
                            <li class="page-item"
                                th:classappend="${students.last} ? 'disabled'">

                                <a class="page-link"
                                   th:href="@{'/students/list'(page=${students.last ? students.number : students.number +1}, size=${students.size})}">

                                    <i class="bi bi-chevron-right"></i>

                                </a>

                            </li>

                        </ul>

                    </nav>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- SCRIPTS -->
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

<script>

    document.querySelectorAll('.chip').forEach(chip => {

        chip.addEventListener('click', () => {

            document.querySelectorAll('.chip')
                .forEach(c => c.classList.remove('active'));

            chip.classList.add('active');

        });

    });

</script>

</body>

</html>
